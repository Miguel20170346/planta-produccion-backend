# ============================================================
#  Perfil de PRODUCCION (despliegue). Se activa arrancando la app con
#  la variable de entorno  SPRING_PROFILES_ACTIVE=prod
#
#  La conexion a la base (PostgreSQL) NO va aqui: viene de variables de
#  entorno que se configuran en el hosting (ej. Render):
#     SPRING_DATASOURCE_URL       (ej. jdbc:postgresql://HOST/DB?sslmode=require)
#     SPRING_DATASOURCE_USERNAME
#     SPRING_DATASOURCE_PASSWORD
#  Asi no se suben credenciales al repositorio.
# ============================================================

# El hosting (Render) asigna el puerto por la variable de entorno PORT.
server.port=${PORT:8080}

# Hibernate crea/actualiza las tablas solo (la base de produccion arranca vacia).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Origen del frontend permitido por CORS (la URL de Vercel).
# Se define con la variable de entorno FRONTEND_URL en el hosting.
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}
